version: '3.9'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: deploypanel
      POSTGRES_PASSWORD: deploypanel
      POSTGRES_DB: deploypanel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  builder:
    build:
      context: .
      dockerfile: templates/Dockerfile
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production

volumes:
  postgres-data:
